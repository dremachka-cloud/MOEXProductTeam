<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOEX Team Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
:root {
  --bg: #0a0a0f;
  --card: #12121a;
  --card-alt: #16161f;
  --accent: #00d4aa;
  --accent2: #7c6fff;
  --accent-dim: rgba(0,212,170,0.15);
  --accent-glow: rgba(0,212,170,0.4);
  --accent2-glow: rgba(124,111,255,0.4);
  --text: #e0e0e0;
  --text-dim: #888;
  --danger: #ff4444;
  --warning: #ffaa00;
  --success: #00d4aa;
  --radius: 12px;
  --font: 'Plus Jakarta Sans', sans-serif;
  --mono: 'JetBrains Mono', monospace;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:var(--font); background:var(--bg); color:var(--text); min-height:100vh; line-height:1.6; }

.header { text-align:center; padding:40px 20px 20px; border-bottom:1px solid rgba(255,255,255,0.05); }
.header h1 { font-family:var(--mono); font-size:28px; font-weight:700; color:var(--accent); letter-spacing:-0.5px; }
.header p { color:var(--text-dim); font-size:14px; margin-top:4px; }

.container { max-width:1200px; margin:0 auto; padding:0 20px; }

#formSection { max-width:680px; margin:40px auto; transition:opacity 0.4s,transform 0.4s; }
#formSection.hiding { opacity:0; transform:translateY(-10px); }

.form-group { margin-bottom:20px; }
.form-group label { display:block; font-weight:600; font-size:14px; margin-bottom:8px; }
.form-group textarea { width:100%; background:var(--card); border:1px solid rgba(255,255,255,0.08); border-radius:var(--radius); color:var(--text); font-family:var(--font); font-size:15px; padding:14px 16px; outline:none; transition:border-color 0.3s; resize:vertical; min-height:100px; }
.form-group textarea:focus { border-color:var(--accent); }
.form-group .error-msg { color:var(--danger); font-size:12px; margin-top:4px; display:none; }

.btn-primary { display:block; width:100%; padding:16px; font-family:var(--font); font-size:16px; font-weight:700; color:#0a0a0f; background:var(--accent); border:none; border-radius:var(--radius); cursor:pointer; transition:all 0.3s; }
.btn-primary:hover { box-shadow:0 0 30px var(--accent-glow); transform:translateY(-1px); }

#loadingSection { display:none; text-align:center; padding:80px 20px; animation:fadeIn 0.5s; }
.spinner { width:64px; height:64px; margin:0 auto 30px; border-radius:50%; border:3px solid rgba(255,255,255,0.06); border-top-color:var(--accent); animation:spin 1s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.loading-status { font-size:18px; font-weight:600; min-height:28px; transition:opacity 0.3s; }
.progress-bar-wrap { max-width:400px; margin:24px auto 0; height:4px; background:rgba(255,255,255,0.06); border-radius:2px; overflow:hidden; }
.progress-bar-fill { height:100%; width:0%; background:linear-gradient(90deg,var(--accent),#00f5c8); border-radius:2px; transition:width 0.5s; }

#dashboard { display:none; padding-bottom:60px; animation:fadeIn 0.6s; }

.dash-toolbar { display:flex; flex-wrap:wrap; gap:10px; margin:30px 0 24px; justify-content:flex-end; }
.btn-tool { padding:10px 18px; font-family:var(--font); font-size:13px; font-weight:600; border:1px solid rgba(255,255,255,0.1); border-radius:8px; background:var(--card); color:var(--text); cursor:pointer; transition:all 0.2s; }
.btn-tool:hover { border-color:var(--accent); color:var(--accent); }
.btn-tool.accent { background:var(--accent); color:#0a0a0f; border-color:var(--accent); }
.btn-tool.accent:hover { box-shadow:0 0 20px var(--accent-glow); }

.dash-section { margin-bottom:36px; opacity:0; transform:translateY(20px); transition:all 0.5s; }
.dash-section.visible { opacity:1; transform:translateY(0); }
.dash-section h2 { font-size:20px; font-weight:700; margin-bottom:16px; display:flex; align-items:center; gap:10px; }
.dash-section h2 .icon { font-size:22px; }

.comparison-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
.variant-card { background:var(--card); border-radius:var(--radius); padding:24px; border:2px solid transparent; }
.variant-card.traditional { border-color:rgba(255,255,255,0.08); }
.variant-card.ai { border-color:var(--accent2); box-shadow:0 0 20px rgba(124,111,255,0.1); }
.variant-tag { display:inline-block; padding:4px 12px; border-radius:20px; font-size:11px; font-weight:700; text-transform:uppercase; margin-bottom:14px; letter-spacing:0.5px; }
.variant-tag.trad { background:rgba(255,255,255,0.08); color:var(--text-dim); }
.variant-tag.ai { background:rgba(124,111,255,0.2); color:var(--accent2); }
.variant-title { font-size:17px; font-weight:700; margin-bottom:10px; }
.variant-desc { font-size:14px; color:var(--text-dim); line-height:1.6; }

.kpi-comparison { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-top:16px; }
.kpi-col { display:flex; flex-direction:column; gap:12px; }
.kpi-col-header { font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; padding-bottom:8px; border-bottom:2px solid; margin-bottom:4px; }
.kpi-col-header.trad { color:var(--text-dim); border-color:rgba(255,255,255,0.1); }
.kpi-col-header.ai { color:var(--accent2); border-color:var(--accent2); }
.kpi-card { background:var(--card); border-radius:var(--radius); padding:18px; text-align:center; border:1px solid rgba(255,255,255,0.04); transition:transform 0.2s; }
.kpi-card:hover { transform:translateY(-2px); }
.kpi-value { font-family:var(--mono); font-size:28px; font-weight:700; line-height:1.2; }
.kpi-value.trad-color { color:var(--text); }
.kpi-value.ai-color { color:var(--accent2); }
.kpi-label { font-size:12px; color:var(--text-dim); margin-top:4px; }

.savings-banner { background:linear-gradient(135deg, rgba(0,212,170,0.1), rgba(124,111,255,0.1)); border:1px solid rgba(0,212,170,0.3); border-radius:var(--radius); padding:24px; text-align:center; margin-top:20px; }
.savings-value { font-family:var(--mono); font-size:36px; font-weight:700; color:var(--accent); }
.savings-label { font-size:14px; color:var(--text-dim); margin-top:4px; }
.savings-detail { font-size:13px; color:var(--text-dim); margin-top:8px; }

.tables-comparison { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
.table-col h3 { font-size:14px; font-weight:700; margin-bottom:10px; padding:8px 14px; border-radius:8px; }
.table-col h3.trad { background:rgba(255,255,255,0.05); color:var(--text-dim); }
.table-col h3.ai { background:rgba(124,111,255,0.1); color:var(--accent2); }
.table-wrap { overflow-x:auto; border-radius:var(--radius); border:1px solid rgba(255,255,255,0.06); }
table { width:100%; border-collapse:collapse; font-size:13px; }
thead th { background:var(--accent); color:#0a0a0f; font-weight:700; padding:10px 12px; text-align:left; white-space:nowrap; font-size:12px; }
thead.ai-head th { background:var(--accent2); }
tbody td { padding:9px 12px; border-bottom:1px solid rgba(255,255,255,0.04); }
tbody tr:nth-child(even) { background:var(--card); }
tbody tr:nth-child(odd) { background:var(--card-alt); }
tbody tr.total-row { font-weight:700; background:rgba(0,212,170,0.08); }
tbody tr.total-row td { border-bottom:none; }

.metrics-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; }
.metric-card { background:var(--card); border-radius:var(--radius); padding:24px; border:1px solid rgba(255,255,255,0.04); }
.metric-name { font-size:16px; font-weight:700; margin-bottom:4px; }
.metric-desc { font-size:12px; color:var(--text-dim); margin-bottom:16px; line-height:1.5; }
.metric-values { display:flex; justify-content:center; gap:20px; font-size:13px; margin-bottom:12px; }
.metric-threshold { color:var(--warning); }
.metric-target { color:var(--success); }
.metric-measure { font-size:11px; color:var(--text-dim); line-height:1.5; border-top:1px solid rgba(255,255,255,0.06); padding-top:10px; }

.risks-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
.risk-card { background:var(--card); border-radius:var(--radius); padding:20px; border:1px solid rgba(255,255,255,0.04); }
.risk-title { font-weight:700; font-size:15px; margin-bottom:10px; }
.risk-badges { display:flex; gap:8px; margin-bottom:10px; }
.badge { padding:3px 10px; border-radius:20px; font-size:11px; font-weight:700; }
.badge-high { background:rgba(255,68,68,0.2); color:var(--danger); }
.badge-medium { background:rgba(255,170,0,0.2); color:var(--warning); }
.badge-low { background:rgba(0,212,170,0.2); color:var(--success); }
.risk-mitigation { font-size:13px; color:var(--text-dim); line-height:1.5; }

.risk-matrix-wrap { margin-top:24px; display:flex; justify-content:center; }
.risk-matrix { display:grid; grid-template-columns:40px repeat(3,80px); grid-template-rows:repeat(3,60px) 30px; gap:3px; font-size:11px; text-align:center; }
.rm-label { display:flex; align-items:center; justify-content:center; font-weight:600; color:var(--text-dim); font-size:10px; }
.rm-label-y { writing-mode:vertical-rl; transform:rotate(180deg); }
.rm-cell { border-radius:6px; display:flex; align-items:center; justify-content:center; font-family:var(--mono); font-weight:700; font-size:12px; gap:3px; flex-wrap:wrap; padding:4px; }
.rm-green { background:rgba(0,212,170,0.15); color:var(--success); }
.rm-yellow { background:rgba(255,170,0,0.15); color:var(--warning); }
.rm-red { background:rgba(255,68,68,0.15); color:var(--danger); }
.rm-dot { width:20px; height:20px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:10px; color:#fff; font-weight:700; background:rgba(255,255,255,0.2); }

.desc-card { background:var(--card); border-radius:var(--radius); padding:24px 28px; border-left:4px solid var(--accent); font-size:15px; line-height:1.7; }

.toast { position:fixed; top:20px; right:20px; padding:14px 22px; background:var(--card); border:1px solid var(--accent); border-radius:8px; font-size:14px; color:var(--accent); z-index:9999; animation:toastIn 0.3s,toastOut 0.3s 2.5s forwards; box-shadow:0 4px 20px rgba(0,0,0,0.4); }
@keyframes toastIn { from{opacity:0;transform:translateY(-10px)} to{opacity:1;transform:translateY(0)} }
@keyframes toastOut { from{opacity:1} to{opacity:0;transform:translateY(-10px)} }

#errorDisplay { display:none; max-width:680px; margin:30px auto; padding:20px 24px; background:rgba(255,68,68,0.08); border:1px solid rgba(255,68,68,0.3); border-radius:var(--radius); color:var(--danger); text-align:center; }
.footer { text-align:center; padding:30px; font-size:12px; color:var(--text-dim); border-top:1px solid rgba(255,255,255,0.04); margin-top:40px; }

@keyframes fadeIn { from{opacity:0} to{opacity:1} }

@media (max-width:900px) {
  .comparison-grid,.kpi-comparison,.tables-comparison,.risks-grid { grid-template-columns:1fr; }
  .metrics-grid { grid-template-columns:1fr; }
}
@media (max-width:600px) {
  .header h1 { font-size:22px; }
  .kpi-value { font-size:22px; }
  .savings-value { font-size:28px; }
}
</style>
</head>
<body>

<div class="header">
  <h1>MOEX Team Calculator</h1>
  <p>Традиционный подход vs Vibecoding с Claude AI</p>
</div>

<div id="formSection" class="container" style="max-width:680px;margin:40px auto">
  <div class="form-group">
    <label>Описание задачи команды</label>
    <textarea id="taskInput" placeholder="Опишите задачу, которую должна решать ИТ команда. Например: Развивать инхаус BPM-систему, интегрировать с торговой системой и автоматизировать 10 процессов..."></textarea>
    <div class="error-msg" id="taskError">Заполните описание задачи</div>
  </div>
  <div class="form-group">
    <label>Ценность для бизнеса</label>
    <textarea id="valueInput" placeholder="Какую ценность команда принесёт организации? Например: Сокращение time-to-market, снижение операционных расходов..."></textarea>
    <div class="error-msg" id="valueError">Заполните ценность для бизнеса</div>
  </div>
  <button class="btn-primary" onclick="startCalculation()">Рассчитать команду</button>
</div>

<div id="loadingSection">
  <div class="spinner"></div>
  <div class="loading-status" id="statusText"></div>
  <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressFill"></div></div>
</div>

<div id="errorDisplay">
  <div id="errorText"></div><br>
  <button class="btn-tool accent" onclick="resetToForm()">Попробовать снова</button>
</div>

<div id="dashboard" class="container"></div>
<div class="footer">Powered by AI &bull; Московская биржа &bull; 2026</div>

<script>
const API_KEY='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';
let lastResult=null;

function showToast(m){const t=document.createElement('div');t.className='toast';t.textContent=m;document.body.appendChild(t);setTimeout(()=>t.remove(),3000);}
function fmt(n){return Math.round(n).toLocaleString('ru-RU');}
function fmtMln(n){return (n/1e6).toFixed(1).replace('.',',')+' млн ₽';}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function badgeClass(l){l=(l||'').toLowerCase();if(l.includes('высок'))return'badge-high';if(l.includes('средн'))return'badge-medium';return'badge-low';}

const statuses=['Анализирую описание задачи...','Рассчитываю традиционную команду...','Рассчитываю зарплаты Москва 2026...','Моделирую команду с vibecoding от Claude...','Считаю экономию от AI-инструментов...','Формирую метрики эффективности...','Оцениваю риски...','Собираю dashboard...'];
let sIdx=0,sInt=null;
function startStatus(){sIdx=0;const e=document.getElementById('statusText'),f=document.getElementById('progressFill');e.textContent=statuses[0];f.style.width='0%';sInt=setInterval(()=>{sIdx++;if(sIdx<statuses.length){e.style.opacity=0;setTimeout(()=>{e.textContent=statuses[sIdx];e.style.opacity=1;},200);f.style.width=((sIdx+1)/statuses.length*100)+'%';}else clearInterval(sInt);},2500);}
function stopStatus(){clearInterval(sInt);document.getElementById('progressFill').style.width='100%';}

function validate(){let ok=true;['task','value'].forEach(id=>{const i=document.getElementById(id+'Input'),e=document.getElementById(id+'Error');if(!i.value.trim()){e.style.display='block';ok=false;}else e.style.display='none';});return ok;}

async function startCalculation(){
  if(!validate())return;
  const task=document.getElementById('taskInput').value.trim();
  const value=document.getElementById('valueInput').value.trim();
  const form=document.getElementById('formSection');
  form.classList.add('hiding');
  setTimeout(()=>{form.style.display='none';},400);
  setTimeout(()=>{document.getElementById('loadingSection').style.display='block';startStatus();},400);
  try{
    const[trad,ai]=await Promise.all([callAPI(task,value,'traditional'),callAPI(task,value,'ai')]);
    lastResult={traditional:trad,ai:ai};
    stopStatus();
    setTimeout(()=>{document.getElementById('loadingSection').style.display='none';renderDashboard(trad,ai);document.getElementById('dashboard').style.display='block';},600);
  }catch(err){stopStatus();document.getElementById('loadingSection').style.display='none';document.getElementById('errorText').textContent=err.message;document.getElementById('errorDisplay').style.display='block';}
}
function resetToForm(){document.getElementById('errorDisplay').style.display='none';document.getElementById('dashboard').style.display='none';document.getElementById('dashboard').innerHTML='';const f=document.getElementById('formSection');f.style.display='block';setTimeout(()=>f.classList.remove('hiding'),50);}

const SAL=`
Зарплаты на руки для ФИНТЕХ Москва 2026 (МИНИМАЛЬНЫЕ ориентиры):
Junior dev: 150000-180000, Middle dev: 220000-280000, Senior dev: 300000-380000
Lead/TechLead: 350000-450000, Architect: 370000-450000, DevOps/SRE: 250000-350000
QA Senior: 220000-300000, QA Middle: 170000-220000, BA: 220000-300000
PO/PM: 300000-400000, Designer: 200000-300000, Data Engineer: 250000-350000
AppSec/ИБ: 280000-380000, TechWriter: 160000-220000, Руководитель: 350000-500000
Мосбиржа — ПРЕМИАЛЬНЫЙ работодатель. НЕ ЗАНИЖАЙ.`;

function sysPrompt(v){
  if(v==='traditional')return`Ты — CTO Московской биржи (2400 сотрудников). Рассчитай ТРАДИЦИОННУЮ команду — БЕЗ AI-инструментов. Классический подход: все задачи выполняются людьми, водопадная/agile методология без AI.
${SAL}
Ответь СТРОГО JSON без markdown:
{"approach_name":"Традиционный подход","approach_description":"2-3 предложения","team_description":"3-5 предложений","team_size":<сумма count>,"roles":[{"role":"название","count":<число>,"seniority":"Junior|Middle|Senior|Lead","salary_net":<руб/мес>,"total_cost":<salary_net/0.87*1.302*1.2 округлить>,"justification":"зачем"}],"monthly_cost":<сумма total_cost*count>,"annual_cost":<*12>,"annual_cost_with_overhead":<*1.15>,"timeline_months":<срок>,"metrics":[{"name":"","description":"","threshold":"","target":"","measurement":""}],"risks":[{"risk":"","probability":"Высокая|Средняя|Низкая","impact":"Высокий|Средний|Низкий","mitigation":""}]}
Ровно 3 метрики, 5 рисков.`;
  return`Ты — CTO Московской биржи. Рассчитай ОПТИМИЗИРОВАННУЮ команду с vibecoding от Claude (Anthropic) и AI-инструментами:
- Разработчики используют Claude Code, Cursor, Copilot — AI пишет ~60-70% кода
- Claude генерирует документацию, тесты, API-спецификации
- AI помогает в бизнес-анализе
- 1 senior с AI = 2 middle без AI
- Меньше QA — AI генерирует тесты
- TechWriter не нужен — Claude делает документацию
- Команда на 25-40% МЕНЬШЕ и ДЕШЕВЛЕ, но решает ту же задачу
- Тимлайн на 30-40% КОРОЧЕ
${SAL}
К зарплатам +15-20% за AI-компетенции.
Ответь СТРОГО JSON без markdown:
{"approach_name":"Vibecoding с Claude AI","approach_description":"2-3 предложения","team_description":"3-5 предложений","team_size":<сумма count>,"roles":[{"role":"","count":<>,"seniority":"","salary_net":<с AI-надбавкой>,"total_cost":<salary_net/0.87*1.302*1.2>,"justification":"как использует AI"}],"monthly_cost":<>,"annual_cost":<>,"annual_cost_with_overhead":<*1.15>,"ai_tools_annual_cost":<годовые AI-лицензии ~15000-25000 руб/мес/чел>,"timeline_months":<короче традиционного>,"metrics":[{"name":"","description":"","threshold":"","target":"","measurement":""}],"risks":[{"risk":"","probability":"","impact":"","mitigation":""}]}
Ровно 3 метрики, 5 рисков.`;
}

async function callAPI(task,value,variant){
  let r;
  try{r=await fetch('https://api.groq.com/openai/v1/chat/completions',{method:'POST',headers:{'Authorization':'Bearer '+API_KEY,'Content-Type':'application/json'},body:JSON.stringify({model:'llama-3.3-70b-versatile',max_tokens:4000,temperature:0.3,response_format:{type:'json_object'},messages:[{role:'system',content:sysPrompt(variant)},{role:'user',content:`Задача:\n${task}\n\nЦенность:\n${value}`}]})});}
  catch(e){throw new Error('Нет подключения к интернету.');}
  if(r.status===401)throw new Error('Неверный API-ключ.');
  if(r.status===429)throw new Error('Лимит запросов. Подождите минуту.');
  if(!r.ok)throw new Error('Ошибка API ('+r.status+').');
  const j=await r.json();const c=j.choices?.[0]?.message?.content;
  if(!c)throw new Error('Пустой ответ AI.');
  try{return JSON.parse(c.replace(/```json|```/g,'').trim());}
  catch(e){throw new Error('Некорректный JSON от AI.');}
}

function renderDashboard(trad,ai){
  const d=document.getElementById('dashboard');d.innerHTML='';
  const tb=document.createElement('div');tb.className='dash-toolbar';
  tb.innerHTML=`<button class="btn-tool accent" onclick="resetToForm()">↻ Новый расчёт</button><button class="btn-tool" onclick="exportPDF()">📄 PDF</button><button class="btn-tool" onclick="copyJSON()">📋 JSON</button>`;
  d.appendChild(tb);
  const ct=document.createElement('div');ct.id='dashContent';d.appendChild(ct);

  // 1. Approaches
  const s1=sec('⚡','Сравнение подходов');
  s1.innerHTML+=`<div class="comparison-grid">
    <div class="variant-card traditional"><span class="variant-tag trad">Традиционный</span><div class="variant-title">${esc(trad.approach_name||'Традиционный подход')}</div><div class="variant-desc">${esc(trad.approach_description||'')}</div></div>
    <div class="variant-card ai"><span class="variant-tag ai">⚡ Vibecoding + Claude</span><div class="variant-title">${esc(ai.approach_name||'Vibecoding с Claude AI')}</div><div class="variant-desc">${esc(ai.approach_description||'')}</div></div>
  </div>`;ct.appendChild(s1);

  // 2. KPIs
  const s2=sec('📊','Ключевые показатели');
  const tT=trad.timeline_months||12,aT=ai.timeline_months||8;
  const aiTool=ai.ai_tools_annual_cost||0;
  const totalAi=ai.annual_cost_with_overhead+aiTool;
  const sav=trad.annual_cost_with_overhead-totalAi;
  const savP=trad.annual_cost_with_overhead>0?((sav/trad.annual_cost_with_overhead)*100).toFixed(0):0;

  s2.innerHTML+=`<div class="kpi-comparison">
    <div class="kpi-col"><div class="kpi-col-header trad">Традиционный</div>
      <div class="kpi-card"><div class="kpi-value trad-color">${trad.team_size}</div><div class="kpi-label">человек</div></div>
      <div class="kpi-card"><div class="kpi-value trad-color">${fmtMln(trad.monthly_cost)}</div><div class="kpi-label">в месяц</div></div>
      <div class="kpi-card"><div class="kpi-value trad-color">${fmtMln(trad.annual_cost_with_overhead)}</div><div class="kpi-label">в год</div></div>
      <div class="kpi-card"><div class="kpi-value trad-color">${tT} мес</div><div class="kpi-label">срок</div></div>
    </div>
    <div class="kpi-col"><div class="kpi-col-header ai">⚡ Vibecoding + Claude</div>
      <div class="kpi-card"><div class="kpi-value ai-color">${ai.team_size}</div><div class="kpi-label">человек</div></div>
      <div class="kpi-card"><div class="kpi-value ai-color">${fmtMln(ai.monthly_cost)}</div><div class="kpi-label">в месяц</div></div>
      <div class="kpi-card"><div class="kpi-value ai-color">${fmtMln(totalAi)}</div><div class="kpi-label">в год + AI-лицензии</div></div>
      <div class="kpi-card"><div class="kpi-value ai-color">${aT} мес</div><div class="kpi-label">срок</div></div>
    </div>
  </div>`;
  if(sav>0){s2.innerHTML+=`<div class="savings-banner"><div class="savings-value">−${fmtMln(sav)}</div><div class="savings-label">экономия в год (${savP}%)</div><div class="savings-detail">на ${trad.team_size-ai.team_size} чел. меньше · на ${tT-aT} мес. быстрее${aiTool?' · AI-лицензии: '+fmtMln(aiTool)+'/год':''}</div></div>`;}
  ct.appendChild(s2);

  // 3. Tables
  const s3=sec('👥','Состав команд');
  s3.innerHTML+=`<div class="tables-comparison">
    <div class="table-col"><h3 class="trad">Традиционный — ${trad.team_size} чел.</h3>${mkTable(trad.roles,false)}</div>
    <div class="table-col"><h3 class="ai">⚡ Vibecoding — ${ai.team_size} чел.</h3>${mkTable(ai.roles,true)}</div>
  </div>`;ct.appendChild(s3);

  // 4. Description
  const s4=sec('📋','Описание (vibecoding-вариант)');
  s4.innerHTML+=`<div class="desc-card">${esc(ai.team_description)}</div>`;ct.appendChild(s4);

  // 5. Metrics
  const s5=sec('🎯','Метрики эффективности');
  let mH='<div class="metrics-grid">';
  (ai.metrics||[]).forEach(m=>{mH+=`<div class="metric-card"><div class="metric-name">${esc(m.name)}</div><div class="metric-desc">${esc(m.description)}</div><div class="metric-values"><span class="metric-threshold">Порог: ${esc(m.threshold)}</span><span class="metric-target">Цель: ${esc(m.target)}</span></div><div class="metric-measure">${esc(m.measurement)}</div></div>`;});
  mH+='</div>';s5.innerHTML+=mH;ct.appendChild(s5);

  // 6. Risks
  const s6=sec('⚠️','Реестр рисков');
  let rH='<div class="risks-grid">';
  (ai.risks||[]).forEach((r,i)=>{rH+=`<div class="risk-card"><div class="risk-title">${i+1}. ${esc(r.risk)}</div><div class="risk-badges"><span class="badge ${badgeClass(r.probability)}">Вер: ${esc(r.probability)}</span><span class="badge ${badgeClass(r.impact)}">Вл: ${esc(r.impact)}</span></div><div class="risk-mitigation">${esc(r.mitigation)}</div></div>`;});
  rH+='</div>';s6.innerHTML+=rH;

  // Matrix
  const mc=[['rm-yellow','rm-red','rm-red'],['rm-green','rm-yellow','rm-red'],['rm-green','rm-green','rm-yellow']];
  const pM={'Высокая':0,'Средняя':1,'Низкая':2},iM={'Низкий':0,'Средний':1,'Высокий':2};
  let cl=Array.from({length:3},()=>Array.from({length:3},()=>[]));
  (ai.risks||[]).forEach((r,i)=>{cl[pM[r.probability]??1][iM[r.impact]??1].push(i+1);});
  let mx='<div class="risk-matrix-wrap"><div class="risk-matrix"><div></div>';
  ['Низкое','Среднее','Высокое'].forEach(l=>{mx+=`<div class="rm-label">${l}</div>`;});
  ['Высокая','Средняя','Низкая'].forEach((l,row)=>{mx+=`<div class="rm-label rm-label-y">${l}</div>`;for(let c=0;c<3;c++){const dots=cl[row][c].map(n=>`<span class="rm-dot">${n}</span>`).join('');mx+=`<div class="rm-cell ${mc[row][c]}">${dots}</div>`;}});
  mx+='<div></div><div class="rm-label" style="grid-column:span 3">Влияние →</div></div></div>';
  s6.innerHTML+=mx;ct.appendChild(s6);

  setTimeout(()=>{document.querySelectorAll('.dash-section').forEach((s,i)=>{setTimeout(()=>s.classList.add('visible'),i*200);});},100);
}

function sec(ic,t){const s=document.createElement('div');s.className='dash-section';s.innerHTML=`<h2><span class="icon">${ic}</span>${t}</h2>`;return s;}

function mkTable(roles,isAi){
  let tot=0,rows='';
  (roles||[]).forEach((r,i)=>{const lc=r.total_cost*r.count;tot+=lc;rows+=`<tr><td>${i+1}</td><td>${esc(r.role)}</td><td>${esc(r.seniority)}</td><td style="text-align:center">${r.count}</td><td style="font-family:var(--mono)">${fmt(r.salary_net)} ₽</td><td style="font-family:var(--mono)">${fmt(lc)} ₽</td></tr>`;});
  rows+=`<tr class="total-row"><td colspan="5" style="text-align:right">ИТОГО/мес:</td><td style="font-family:var(--mono);color:${isAi?'var(--accent2)':'var(--accent)'}">${fmt(tot)} ₽</td></tr>`;
  return`<div class="table-wrap"><table><thead class="${isAi?'ai-head':''}"><tr><th>№</th><th>Роль</th><th>Грейд</th><th>×</th><th>На руки</th><th>Для компании</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}

async function exportPDF(){const b=event.target,o=b.textContent;b.textContent='⏳...';b.disabled=true;try{await html2pdf().set({margin:10,filename:`MOEX_Team_${new Date().toISOString().slice(0,10)}.pdf`,image:{type:'jpeg',quality:0.95},html2canvas:{scale:2,backgroundColor:'#0a0a0f'},jsPDF:{unit:'mm',format:'a4',orientation:'portrait'}}).from(document.getElementById('dashContent')).save();}catch(e){showToast('Ошибка PDF');}b.textContent=o;b.disabled=false;}
function copyJSON(){if(!lastResult){showToast('Нет данных');return;}navigator.clipboard.writeText(JSON.stringify(lastResult,null,2)).then(()=>showToast('JSON скопирован')).catch(()=>showToast('Ошибка'));}
</script>
</body>
